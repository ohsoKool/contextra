_schema-version: 3.3.0

ID: contextra

version: 1.0.0

description: "Contextra AI Assistant"

parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:
  - name: contextra-srv
    type: nodejs
    path: gen/srv

    parameters:
      instances: 1
      buildpack: nodejs_buildpack

    build-parameters:
      builder: npm-ci
      ignore:
        - "node_modules/"

    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

    requires:
      - name: contextra-db
      - name: contextra-auth
      - name: contextra-destination

  - name: contextra-db-deployer
    type: hdb
    path: gen/db

    parameters:
      buildpack: nodejs_buildpack

    requires:
      - name: contextra-db

  - name: contextra-app-deployer
    type: com.sap.application.content
    path: gen

    build-parameters:
      build-result: app/

      requires:
        - name: contextraui5app
          artifacts:
            - contextraui5app.zip
          target-path: app/

    requires:
      - name: contextra-auth

      - name: srv-api

      - name: contextra-html5-repo-host
        parameters:
          content-target: true

          config:
            HTML5Runtime_enabled: true

    parameters:
      config:
        destinations:
          - Name: srv-api
            URL: ~{srv-api/srv-url}
            Authentication: OAuth2UserTokenExchange
            Type: HTTP
            ProxyType: Internet
            HTML5.ForwardAuthToken: true
            HTML5.DynamicDestination: true

  - name: contextraui5app
    type: html5
    path: app/ui5app

    build-parameters:
      build-result: dist

      builder: custom

      commands:
        - npm ci
        - npm run build
        - ui5 build preload --config ui5-deploy.yaml

      supported-platforms: []

  - name: contextra-destinations
    type: com.sap.application.content

    requires:
      - name: contextra-auth
        parameters:
          service-key:
            name: contextra-auth-key

      - name: contextra-html5-repo-host
        parameters:
          service-key:
            name: contextra-html5-repo-host-key

      - name: srv-api

      - name: contextra-destination
        parameters:
          content-target: true

    build-parameters:
      no-source: true

    parameters:
      content:
        instance:
          existing_destinations_policy: update

          destinations:
            - Name: contextra-html5-repository
              ServiceInstanceName: contextra-html5-repo-host
              ServiceKeyName: contextra-html5-repo-host-key
              sap.cloud.service: contextra.service

            - Name: contextra-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: contextra-auth
              ServiceKeyName: contextra-auth-key
              sap.cloud.service: contextra.service

resources:
  - name: contextra-db
    type: com.sap.xs.hdi-container

    parameters:
      service: hana
      service-plan: hdi-shared

  - name: contextra-auth
    type: org.cloudfoundry.managed-service

    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json

      config:
        xsappname: contextra-${org}-${space}

        tenant-mode: dedicated

        oauth2-configuration:
          credential-types:
            - binding-secret
            - x509

  - name: contextra-destination
    type: org.cloudfoundry.managed-service

    parameters:
      service: destination
      service-plan: lite

    requires:
      - name: srv-api

  - name: contextra-html5-repo-host
    type: org.cloudfoundry.managed-service

    parameters:
      service: html5-apps-repo
      service-plan: app-host
