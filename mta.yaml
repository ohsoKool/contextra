_schema-version: 3.3.0

ID: contextragen
version: 1.0.0
description: "Contextragen AI Assistant"

parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:
  # ============================================
  # CAP SERVICE
  # ============================================

  - name: contextragen-srv
    type: nodejs
    path: gen/srv

    parameters:
      instances: 1
      buildpack: nodejs_buildpack

    build-parameters:
      builder: npm-ci
      ignore:
        - node_modules/

    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

    requires:
      - name: contextragen-db
      - name: contextragen-auth
      - name: contextragen-destination

  # ============================================
  # HANA DEPLOYER
  # ============================================

  - name: contextragen-db-deployer
    type: hdb
    path: gen/db

    parameters:
      buildpack: nodejs_buildpack

    requires:
      - name: contextragen-db

  # ============================================
  # UI5 APPLICATION
  # ============================================

  - name: contextragen-ui
    type: html5
    path: app/contextragen-ui

    parameters:
      sap.cloud.service: contextragen

    build-parameters:
      builder: custom
      build-result: dist

      commands:
        - npm ci
        - npm run build:cf

      supported-platforms: []

  # ============================================
  # HTML5 APP CONTENT DEPLOYER
  # ============================================

  - name: contextragen-app-content
    type: com.sap.application.content
    path: .

    requires:
      - name: contextragen-html5-repo-host
        parameters:
          content-target: true

    build-parameters:
      build-result: resources

      requires:
        - name: contextragen-ui
          artifacts:
            - contextragen-ui.zip
          target-path: resources/

  # ============================================
  # DESTINATION CONTENT
  # ============================================

  - name: contextragen-destination-content
    type: com.sap.application.content

    requires:
      - name: contextragen-destination
        parameters:
          content-target: true

      - name: contextragen-html5-repo-host
        parameters:
          service-key:
            name: contextragen-html5-repo-host-key

      - name: contextragen-auth
        parameters:
          service-key:
            name: contextragen-auth-key

      - name: srv-api

    build-parameters:
      no-source: true

    parameters:
      content:
        instance:
          existing_destinations_policy: update

          destinations:
            # HTML5 Repo Destination

            - Name: contextragen-html5-repo-host
              ServiceInstanceName: contextragen-html5-repo-host
              ServiceKeyName: contextragen-html5-repo-host-key
              sap.cloud.service: contextragen

            # XSUAA Destination

            - Name: contextragen-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: contextragen-auth
              ServiceKeyName: contextragen-auth-key
              sap.cloud.service: contextragen

            # CAP Backend Destination

            - Name: srv-api
              URL: ~{srv-api/srv-url}
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: contextragen-auth
              ServiceKeyName: contextragen-auth-key
              HTML5.DynamicDestination: true

resources:
  # ============================================
  # HANA HDI CONTAINER
  # ============================================

  - name: contextragen-db
    type: com.sap.xs.hdi-container

    parameters:
      service: hana
      service-plan: hdi-shared

  # ============================================
  # XSUAA
  # ============================================

  - name: contextragen-auth
    type: org.cloudfoundry.managed-service

    parameters:
      service: xsuaa
      service-plan: application
      service-name: contextragen-auth
      path: ./xs-security.json

      config:
        xsappname: contextragen-${org}-${space}

        tenant-mode: dedicated

        oauth2-configuration:
          credential-types:
            - binding-secret
            - x509

  # ============================================
  # DESTINATION SERVICE
  # ============================================

  - name: contextragen-destination
    type: org.cloudfoundry.managed-service

    parameters:
      service: destination
      service-plan: lite
      service-name: contextragen-destination

      config:
        HTML5Runtime_enabled: true

        init_data:
          instance:
            existing_destinations_policy: update

            destinations:
              - Name: ui5
                URL: https://ui5.sap.com
                Type: HTTP
                ProxyType: Internet
                Authentication: NoAuthentication

        version: 1.0.0

  # ============================================
  # HTML5 APPS REPOSITORY
  # ============================================

  - name: contextragen-html5-repo-host
    type: org.cloudfoundry.managed-service

    parameters:
      service: html5-apps-repo
      service-plan: app-host
      service-name: contextragen-html5-repo-host
