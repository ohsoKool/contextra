specVersion: "4.0"

metadata:
  name: ui5app

type: application

resources:
  configuration:
    propertiesFileSourceEncoding: UTF-8

builder:
  resources:
    excludes:
      - "/test/**"
      - "/localService/**"

  customTasks:
    - name: ui5-task-zipper
      afterTask: generateCachebusterInfo
      configuration:
        archiveName: contextra-ui
        relativePaths: true
        additionalFiles:
          - xs-app.json
