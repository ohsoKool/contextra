specVersion: "3.1"

metadata:
  name: ui5app

type: application

server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertErrors: true

        backend:
          - path: /odata
            url: http://localhost:4004

        ui5:
          path:
            - /resources
            - /test-resources
          url: https://sdk.openui5.org

    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
